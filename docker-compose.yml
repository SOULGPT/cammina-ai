version: "3.9"

services:
  # ── Frontend ──────────────────────────────────────────────────────────────
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    depends_on:
      - orchestrator
    profiles: [full]

  # ── Orchestrator ─────────────────────────────────────────────────────────
  orchestrator:
    build:
      context: ./services/orchestrator
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env.local
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── LLM Manager ──────────────────────────────────────────────────────────
  llm_manager:
    build:
      context: ./services/llm_manager
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    env_file:
      - .env.local
    restart: unless-stopped

  # ── Memory Service ────────────────────────────────────────────────────────
  memory:
    build:
      context: ./services/memory
      dockerfile: Dockerfile
    ports:
      - "8002:8002"
    env_file:
      - .env.local
    depends_on:
      - qdrant
    restart: unless-stopped

  # ── Local Agent ───────────────────────────────────────────────────────────
  local_agent:
    build:
      context: ./services/local_agent
      dockerfile: Dockerfile
    ports:
      - "8003:8003"
    env_file:
      - .env.local
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped

  # ── Infrastructure ────────────────────────────────────────────────────────
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cammina}
      POSTGRES_USER: ${POSTGRES_USER:-cammina}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cammina}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrantdata:/qdrant/storage

volumes:
  pgdata:
  redisdata:
  qdrantdata:
